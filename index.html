<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes" />
  <title>Goldenmole Dashboard</title>
</head>

<body>
  <div id="global-error-display"
    style="display:none; padding:20px; background:#fee; color:red; border:2px solid red; margin:20px; white-space:pre-wrap; font-family:monospace; z-index:9999; position:relative;">
  </div>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      var div = document.getElementById('global-error-display');
      div.style.display = 'block';
      div.innerHTML += '<strong>Global Error:</strong> ' + msg + '\n' + (url || '') + ':' + (line || '') + ':' + (col || '') + '\n' + (error ? error.stack : '') + '\n\n';
    };
    window.onunhandledrejection = function (e) {
      var div = document.getElementById('global-error-display');
      div.style.display = 'block';
      div.innerHTML += '<strong>Unhandled Promise Rejection:</strong> ' + (e.reason ? (e.reason.stack || e.reason) : e.reason) + '\n\n';
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
